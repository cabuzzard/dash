<!DOCTYPE html>
<html lang="en">
<head>la on ther ighte track  yea 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hermes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --surface2:  #1a1a1a;
    --border:    #1e1e1e;
    --border2:   #2e2e2e;
    --text:      #ffffff;
    --text2:     #888888;
    --text3:     #444444;
    --accent:    #ffffff;
    --danger:    #ff4444;
    --radius:    12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* ── PIN ── */
  .pin-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; padding: 32px;
  }
  .pin-screen.hidden { display: none; }
  .pin-logo  { font-size: 10px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--text3); margin-bottom: 32px; }
  .pin-title { font-size: 26px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .pin-sub   { font-size: 13px; color: var(--text2); margin-bottom: 40px; }
  .pin-dots  { display: flex; gap: 14px; margin-bottom: 36px; }
  .pin-dot   { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border2); background: transparent; transition: all .15s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error  { background: var(--danger);  border-color: var(--danger); }
  .pin-pad   { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 264px; }
  .pin-btn   { height: 62px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); font-size: 22px; font-weight: 400; color: var(--text); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .1s; }
  .pin-btn:active { background: var(--surface2); transform: scale(.95); }
  .pin-btn.del   { font-size: 16px; color: var(--text2); }
  .pin-btn.empty { background: transparent; border: none; cursor: default; }
  .pin-error { font-size: 12px; color: var(--danger); margin-top: 18px; min-height: 18px; text-align: center; }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 13px 16px; display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 11px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: var(--text); }
  .lock-btn { font-size: 15px; cursor: pointer; color: var(--text3); padding: 4px; }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    margin: 0 -16px 20px; padding: 0 16px;
  }
  .tab {
    font-size: 12px; font-weight: 600; letter-spacing: .06em;
    color: var(--text3); padding: 10px 16px 9px;
    cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: color .15s, border-color .15s;
    user-select: none;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  /* ── TABLE ── */
  .ov-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 8px; }
  .ov-table thead th {
    text-align: left; font-size: 10px; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text); padding: 0 10px 8px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  .ov-table thead th:hover { color: var(--text); opacity: .7; }
  .ov-table thead th .sort-arrow { margin-left: 4px; opacity: .4; font-style: normal; }
  .ov-table thead th.sorted .sort-arrow { opacity: 1; }
  .ov-table thead th:last-child { text-align: center; cursor: default; }
  .ov-table thead th.num { text-align: center; }
  .ov-table tbody tr { border-bottom: 1px solid var(--border); }
  .ov-table tbody tr:last-child { border-bottom: none; }
  .ov-table tbody tr:active { background: var(--surface2); }
  .ov-table td { padding: 10px; vertical-align: middle; }
  .ov-table td.site { font-size: 11px; font-weight: 600; color: var(--text2); white-space: nowrap; }
  .ov-table td.name { color: var(--text); font-weight: 500; }
  .ov-table td.num  { text-align: center; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text); width: 48px; }
  .ov-table td.num.zero { color: var(--text3); }
  .ov-table td.link { text-align: center; width: 44px; }
  .ov-table td.link a {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid #5a2800; color: #ff6a00;
    font-size: 12px; text-decoration: none; transition: all .15s; background: #1a0d00;
  }
  .ov-table td.link a:hover { border-color: #ff6a00; color: #ffaa55; }

  /* ── MISC ── */
  .loading-wrap { display: flex; align-items: center; gap: 8px; padding: 12px 0; color: var(--text3); font-size: 13px; }
  .spinner { width: 15px; height: 15px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin .55s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty     { font-size: 13px; color: var(--text3); font-style: italic; padding: 8px 0; }
  .error-msg { font-size: 13px; color: var(--danger); padding: 8px 0; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 72px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 20px; padding: 9px 18px; font-size: 13px; color: var(--text);
    opacity: 0; transition: all .22s; z-index: 998; white-space: nowrap;
  }
  .toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error   { border-color: var(--danger);  color: var(--danger); }
</style>
</head>
<body>

<!-- PIN -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">Hermes</div>
  <div class="pin-title">Welcome back</div>
  <div class="pin-sub">Enter your PIN to continue</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn empty"></button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error" id="pinError"></div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-title">Hermes</div>
  <div class="lock-btn" onclick="lockApp()" title="Lock">🔒</div>
</div>

<!-- Main -->
<div id="viewMain" style="padding:16px;">

  <div class="tabs">
    <div class="tab active" onclick="switchTab('overview')">Overview</div>
    <div class="tab"        onclick="switchTab('products')">Products</div>
  </div>

  <div class="tab-panel active" id="tabOverview">
    <div id="ovContent">
      <div class="loading-wrap"><div class="spinner"></div>Loading...</div>
    </div>
  </div>

  <div class="tab-panel" id="tabProducts">
    <div id="prodContent">
      <div class="loading-wrap"><div class="spinner"></div>Loading...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = "https://jolly-darkness-5dcc.trailnotes2026.workers.dev";
const PIN        = "1246";

let session  = { authed: false };
let ovLoaded = false;
let pinBuffer = '';

// ── PIN ──────────────────────────────────────────────────────────────
function pinPress(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  updateDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 120);
}
function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots();
  document.getElementById('pinError').textContent = '';
  document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
}
function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.classList.toggle('filled', i < pinBuffer.length);
    dot.classList.remove('error');
  }
}
function checkPin() {
  if (pinBuffer === PIN) {
    session.authed = true;
    document.getElementById('pinScreen').classList.add('hidden');
    if (!ovLoaded) { ovLoaded = true; loadOverview(); }
  } else {
    document.querySelectorAll('.pin-dot').forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
    document.getElementById('pinError').textContent = 'Incorrect PIN — try again';
    setTimeout(() => { pinBuffer = ''; updateDots(); document.getElementById('pinError').textContent = ''; }, 900);
  }
}
function lockApp() {
  pinBuffer = ''; session.authed = false; ovLoaded = false; prodLoaded = false;
  updateDots();
  document.getElementById('pinScreen').classList.remove('hidden');
  document.getElementById('ovContent').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div>Loading...</div>';
  document.getElementById('prodContent').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div>Loading...</div>';
}

// ── WORKER ───────────────────────────────────────────────────────────
async function call(action, extra = {}) {
  const resp = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, pin: PIN, ...extra })
  });
  const data = await resp.json();
  if (!resp.ok || data.error) throw new Error(data.error || 'Error ' + resp.status);
  return data;
}

// ── TABS ─────────────────────────────────────────────────────────────
let prodLoaded = false;

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if (name === 'products' && !prodLoaded) { prodLoaded = true; loadProducts(); }
}

// ── PRODUCTS ─────────────────────────────────────────────────────────
let prodData = [];
let prodSort = { col: 0, asc: true };

async function loadProducts() {
  const el = document.getElementById('prodContent');
  el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div>Loading...</div>';
  try {
    const data = await call('getProducts');
    prodData = data.products || [];
    renderProducts();
  } catch (e) {
    el.innerHTML = '<div class="error-msg">Could not load: ' + esc(e.message) + '</div>';
  }
}

function renderProducts() {
  const el = document.getElementById('prodContent');
  el.innerHTML = '';
  if (!prodData.length) { el.innerHTML = '<div class="empty">No products found.</div>'; return; }

  const cols = [
    { label: 'Title',    key: 'name',     type: 'str' },
    { label: 'Campaign', key: 'campaign', type: 'str' },
    { label: 'Site',     key: 'site',     type: 'str' },
    { label: 'Status',   key: 'status',   type: 'str' },
  ];

  const sorted = [...prodData].sort((a, b) => {
    const col = cols[prodSort.col];
    const av = a[col.key] || '';
    const bv = b[col.key] || '';
    const cmp = String(av).localeCompare(String(bv));
    return prodSort.asc ? cmp : -cmp;
  });

  const table = document.createElement('table');
  table.className = 'ov-table';

  const thead = document.createElement('thead');
  const hrow  = document.createElement('tr');
  cols.forEach((col, i) => {
    const th = document.createElement('th');
    if (i === prodSort.col) th.classList.add('sorted');
    const arrow = i === prodSort.col ? (prodSort.asc ? '▲' : '▼') : '⬍';
    th.innerHTML = col.label + ' <span class="sort-arrow">' + arrow + '</span>';
    th.onclick = () => {
      if (prodSort.col === i) prodSort.asc = !prodSort.asc;
      else { prodSort.col = i; prodSort.asc = true; }
      renderProducts();
    };
    hrow.appendChild(th);
  });
  const dbTh = document.createElement('th');
  dbTh.textContent = 'DB';
  dbTh.style.cssText = 'text-align:center;cursor:default;';
  hrow.appendChild(dbTh);
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  sorted.forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="name">'  + esc(p.name)     + '</td>' +
      '<td class="site">'  + esc(p.campaign || '—') + '</td>' +
      '<td class="site">'  + esc(p.site     || '—') + '</td>' +
      '<td class="site">'  + esc(p.status   || '—') + '</td>' +
      '<td class="link"><a href="https://www.notion.so/' + p.id + '" target="_blank">↗</a></td>';
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  el.appendChild(table);
}

let ovData = [];
let ovSort = { col: 0, asc: true }; // default: sort by site asc

async function loadOverview() {
  const el = document.getElementById('ovContent');
  el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div>Loading...</div>';
  try {
    const data = await call('getCampaigns');
    ovData = data.campaigns || [];
    renderTable();
  } catch (e) {
    el.innerHTML = '<div class="error-msg">Could not load: ' + esc(e.message) + '</div>';
  }
}

function renderTable() {
  const el = document.getElementById('ovContent');
  el.innerHTML = '';
  if (!ovData.length) { el.innerHTML = '<div class="empty">No campaigns found.</div>'; return; }

  // Columns: [label, key, type]
  const cols = [
    { label: 'Site',     key: 'site',      type: 'str' },
    { label: 'Campaign', key: 'name',      type: 'str' },
    { label: 'Dev',      key: 'devTitles', type: 'num' },
    { label: 'Pub',      key: 'pubTitles', type: 'num' },
    { label: 'Prod',     key: 'products',  type: 'num' },
  ];

  // Sort data
  const sorted = [...ovData].sort((a, b) => {
    const col = cols[ovSort.col];
    const av = a[col.key] ?? (col.type === 'num' ? 0 : '');
    const bv = b[col.key] ?? (col.type === 'num' ? 0 : '');
    let cmp = col.type === 'num' ? av - bv : String(av).localeCompare(String(bv));
    return ovSort.asc ? cmp : -cmp;
  });

  const table = document.createElement('table');
  table.className = 'ov-table';

  // Header
  const thead = document.createElement('thead');
  const hrow  = document.createElement('tr');
  cols.forEach((col, i) => {
    const th = document.createElement('th');
    if (col.type === 'num') th.className = 'num';
    if (i === ovSort.col)   th.classList.add('sorted');
    const arrow = i === ovSort.col ? (ovSort.asc ? '▲' : '▼') : '⬍';
    th.innerHTML = col.label + ' <span class="sort-arrow">' + arrow + '</span>';
    th.onclick = () => {
      if (ovSort.col === i) ovSort.asc = !ovSort.asc;
      else { ovSort.col = i; ovSort.asc = col.type === 'num' ? false : true; }
      renderTable();
    };
    hrow.appendChild(th);
  });
  // DB header — not sortable
  const dbTh = document.createElement('th');
  dbTh.textContent = 'DB';
  dbTh.style.cssText = 'text-align:center;cursor:default;';
  hrow.appendChild(dbTh);
  thead.appendChild(hrow);
  table.appendChild(thead);

  // Body
  const tbody = document.createElement('tbody');
  sorted.forEach(c => {
    const notionUrl = 'https://www.notion.so/' + c.id;
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="site">' + esc(c.site || '—') + '</td>' +
      '<td class="name">' + esc(c.name) + '</td>' +
      '<td class="num' + (c.devTitles === 0 ? ' zero' : '') + '">' + c.devTitles + '</td>' +
      '<td class="num' + (c.pubTitles === 0 ? ' zero' : '') + '">' + c.pubTitles + '</td>' +
      '<td class="num' + (c.products  === 0 ? ' zero' : '') + '">' + c.products  + '</td>' +
      '<td class="link"><a href="' + notionUrl + '" target="_blank">↗</a></td>';
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  el.appendChild(table);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TOAST ────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => { t.className = 'toast'; }, 2500);
}
</script>
</body>
</html>
