name = "jolly-darkness-5dcc"
main = "worker.js"
compatibility_date = "2024-01-01"
no_bundle = true

[vars]
# Secrets: NOTION_TOKEN, SESSION_TOKEN, ANTHROPIC_API_KEY (set via: npx wrangler secret put ANTHROPIC_API_KEY)

[[kv_namespaces]]
binding = "TRADES"
id = "344c88fa8ca744fcbe25495b4701666d"

[triggers]
crons = ["0 0 * * *"]

[env]
routes = [{ pattern = "https://cabuzzard.github.io/dash/*" }]